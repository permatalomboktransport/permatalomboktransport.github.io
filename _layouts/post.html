<!DOCTYPE html>
<!-- lang="id" memberi tahu Google bahwa bahasa utama website ini adalah Bahasa Indonesia. class="scroll-smooth" membuat efek gulir halaman menjadi lembut. -->
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- =========================================================================
         BAGIAN 1: PENGATURAN SEO & IDENTITAS HALAMAN (POST)
         Variabel Liquid ({{ ... }}) digunakan agar SEO dinamis sesuai file .md
         ========================================================================= -->
    
    <title>{{ page.title }} - Permata Lombok Transport</title>
    
    <!-- Deskripsi menggunakan 25 kata pertama dari postingan -->
    <meta name="description" content="{{ page.excerpt | strip_html | truncatewords: 25 }}">
    <meta name="author" content="Permata Lombok Transport">
    <meta name="robots" content="index, follow"> 
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">

    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/favicon.png">

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncatewords: 25 }}">
    <meta property="og:image" content="{{ page.gambar_thumbnail }}">
    <meta property="og:site_name" content="Permata Lombok Transport">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.excerpt | strip_html | truncatewords: 25 }}">
    <meta name="twitter:image" content="{{ page.gambar_thumbnail }}">

    <!-- =========================================================================
         BAGIAN 2: SUMBER DAYA EKSTERNAL (LIBRARY)
         ========================================================================= -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- =========================================================================
         BAGIAN 3: KONFIGURASI TEMA (TAILWIND CSS)
         ========================================================================= -->
    <script>
        tailwind.config = {
            darkMode: 'class', // Mengaktifkan mode gelap manual
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'theme-light': '#ffffff',
                        'theme-dark': '#0a1128',
                        'theme-text-dark': '#000000',
                        'theme-blue-light': '#2563EB',
                        'theme-blue-dark': '#1D4ED8',
                        'theme-yellow-light': '#FACC15',
                        'theme-yellow-dark': '#EAB308',
                        'whatsapp': '#25D366',
                        'whatsapp-hover': '#128C7E',
                    },
                    animation: {
                        'heartbeat': 'heartbeat 1.5s ease-in-out infinite',
                        'wave-slow': 'waveAnim 15s linear infinite',
                        'wave-med': 'waveAnim 10s linear infinite',
                        'wave-fast': 'waveAnim 7s linear infinite',
                        'bounce-subtle': 'bounceSubtle 4s ease-in-out infinite',
                        'float-icon': 'floatIcon 3s ease-in-out infinite',
                    },
                    keyframes: {
                        heartbeat: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '14%': { transform: 'scale(1.15)' },
                            '28%': { transform: 'scale(1)' },
                            '42%': { transform: 'scale(1.15)' },
                            '70%': { transform: 'scale(1)' },
                        },
                        waveAnim: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        },
                        floatIcon: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- =========================================================================
         BAGIAN 4: GAYA CSS KUSTOM (MANUAL)
         ========================================================================= -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Poppins:wght@800&display=swap');

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 600;
        }

        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
        }

        /* --- STYLING KHUSUS UNTUK KONTEN MARKDOWN --- */
        /* Kode markdown otomatis masuk ke dalam class .markdown-body */
        .markdown-body { font-family: 'Montserrat', sans-serif; font-weight: 500; }
        .markdown-body p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; }
        .dark .markdown-body p { color: #D1D5DB; }
        .markdown-body h2 { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 2rem; margin-top: 2.5rem; margin-bottom: 1rem; color: #1D4ED8; }
        .dark .markdown-body h2 { color: #FACC15; }
        .markdown-body h3 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.5rem; }
        .markdown-body img { border-radius: 1rem; margin-top: 2rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 800px; }
        .markdown-body blockquote { border-left: 4px solid #FACC15; padding-left: 1rem; font-style: italic; margin-bottom: 1.5rem; }

        /* --- PENGATURAN PRELOADER & HERO TEKS --- */
        #preloader { z-index: 9999; transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1); }
        #preloader-content { transition: opacity 0.8s ease-in-out; }
        #hero-text-content { opacity: 0; transform: translateY(50px); transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #hero-text-content.show { opacity: 1; transform: translateY(0); }

        /* --- KELAS ANIMASI SAAT MENGGULIR (Scroll Reveal) --- */
        .reveal-up { opacity: 0; transform: translateY(50px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-up.is-visible { opacity: 1; transform: translateY(0); }
        .reveal-blur { opacity: 0; filter: blur(10px); transform: translateY(30px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-blur.is-visible { opacity: 1; filter: blur(0); transform: translateY(0); }
        .reveal-zoom { opacity: 0; transform: scale(0.85); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-zoom.is-visible { opacity: 1; transform: scale(1); }

        /* --- KUSTOMISASI TAMPILAN BILAH GULIR (SCROLLBAR) --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #ffffff; }
        .dark ::-webkit-scrollbar-track { background: #0a1128; }
        ::-webkit-scrollbar-thumb { background: #2563EB; }
        .dark ::-webkit-scrollbar-thumb { background: #1D4ED8; }
        ::-webkit-scrollbar-thumb:hover { background: #FACC15; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #EAB308; }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- FUNGSI 1: Memuat Ikon Dasar ---
            const inisialisasiIkon = () => {
                lucide.createIcons();
            };

            // --- FUNGSI 2: Mengelola Mode Gelap/Terang (Dark Mode) ---
            const aturModeTema = () => {
                const themeToggleBtn = document.getElementById('theme-toggle');
                const darkIcon = document.getElementById('theme-toggle-dark-icon');
                const lightIcon = document.getElementById('theme-toggle-light-icon');
                
                if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                    lightIcon.classList.remove('hidden'); 
                } else {
                    document.documentElement.classList.remove('dark');
                    darkIcon.classList.remove('hidden'); 
                }

                themeToggleBtn.addEventListener('click', () => {
                    darkIcon.classList.toggle('hidden');
                    lightIcon.classList.toggle('hidden');

                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('color-theme', 'light');
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('color-theme', 'dark');
                    }
                });
            };

            // --- FUNGSI 3: Mengelola Urutan Animasi Pemuatan Layar (Preloader) ---
            const kelolaPreloader = () => {
                // Di halaman post, gambar latar tidak perlu dipaksa tunggu. Cukup efek animasi logo saja.
                setTimeout(() => {
                    const preloaderContent = document.getElementById('preloader-content');
                    if (preloaderContent) preloaderContent.style.opacity = '0'; 
                    
                    setTimeout(() => {
                        const preloader = document.getElementById('preloader');
                        if (preloader) preloader.style.transform = 'translateX(-100%)'; 
                        
                        setTimeout(() => {
                            if (preloader) preloader.style.display = 'none'; 
                            document.getElementById('body').classList.remove('overflow-hidden'); 
                            
                            const heroText = document.getElementById('hero-text-content');
                            if (heroText) heroText.classList.add('show'); 
                            
                            inisialisasiScrollReveal(); 
                        }, 1000);
                    }, 500);
                }, 1000); // Preloader di post lebih cepat karena tidak ada Bento Grid.
            };

            // --- FUNGSI 4: Buka-Tutup Menu Navigasi Pada Layar Handphone ---
            const kelolaMenuMobile = () => {
                const dropdown = document.getElementById('mobile-dropdown');
                const btnBuka = document.getElementById('mobile-menu-btn');
                const btnTutup = document.getElementById('close-mobile-menu'); 
                let menuTerbuka = false;

                const alihkanMenu = () => {
                    menuTerbuka = !menuTerbuka;
                    if (menuTerbuka) {
                        dropdown.classList.remove('opacity-0', 'pointer-events-none');
                        dropdown.classList.add('opacity-100');
                        document.body.style.overflow = 'hidden'; 
                    } else {
                        dropdown.classList.remove('opacity-100');
                        dropdown.classList.add('opacity-0', 'pointer-events-none');
                        document.body.style.overflow = ''; 
                    }
                };

                btnBuka.addEventListener('click', alihkanMenu);
                if (btnTutup) btnTutup.addEventListener('click', alihkanMenu);
            };

            // --- FUNGSI 5: Menampilkan Elemen Secara Dinamis Saat Layar Digulir (Scroll Reveal) ---
            const inisialisasiScrollReveal = () => {
                const pengaturanPengamat = {
                    root: null,
                    rootMargin: '0px 0px -50px 0px', 
                    threshold: 0.1 
                };

                const pengamat = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible'); 
                            observer.unobserve(entry.target); 
                        }
                    });
                }, pengaturanPengamat);

                const elemenDiperhatikan = document.querySelectorAll('.reveal-up, .reveal-down, .reveal-left, .reveal-right, .reveal-zoom, .reveal-blur, .reveal-flip');
                elemenDiperhatikan.forEach(el => pengamat.observe(el)); 
            };

            // --- Menyalakan Mesin: Menjalankan semua fungsi secara berurutan ---
            inisialisasiIkon();
            aturModeTema();
            kelolaPreloader();
            kelolaMenuMobile();
        });
    </script>
